<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>sell-signal</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main>
      <h1>sell-signal</h1>
      <p>Hosted-model resale triage using your existing Hermes connection.</p>
      <div id="analysis-error" {% if not error %}hidden{% endif %} class="error" role="alert">{{ error or '' }}</div>
      <form id="analyze-form" method="post" action="/analyze" enctype="multipart/form-data">
        <label for="text_input">Text input</label>
        <textarea id="text_input" name="text_input" rows="4" placeholder="The Manga Guide to Relativity by Hideo Nitta paperback">{{ text_input }}</textarea>
        <label for="files">Image upload</label>
        <input id="files" name="files" type="file" accept="image/*" multiple>
        <div id="submission-status" class="status" aria-live="polite"></div>
        <ol id="submission-steps" class="status-steps" aria-live="polite">
          {% for step in submission["progress_steps"] %}
          <li data-step-id="{{ step['id'] }}">{{ step['label'] }}</li>
          {% endfor %}
        </ol>
        <ul id="submission-findings" class="status-findings"></ul>
        <p class="hint">This can take 10 to 30 seconds.</p>
        <button id="analyze-button" type="submit">Analyze</button>
      </form>
      <div id="analysis-output">
        {% include "_result_section.html" %}
      </div>
    </main>
    <script>
      const form = document.getElementById('analyze-form');
      const status = document.getElementById('submission-status');
      const button = document.getElementById('analyze-button');
      const errorBox = document.getElementById('analysis-error');
      const output = document.getElementById('analysis-output');
      const findings = document.getElementById('submission-findings');
      const stepElements = Array.from(document.querySelectorAll('#submission-steps li'));

      const resetProgressUi = () => {
        stepElements.forEach((element) => {
          element.classList.remove('active', 'done');
        });
        if (findings) {
          findings.innerHTML = '';
        }
      };

      const setError = (message) => {
        if (!errorBox) {
          return;
        }
        if (message) {
          errorBox.textContent = message;
          errorBox.hidden = false;
        } else {
          errorBox.textContent = '';
          errorBox.hidden = true;
        }
      };

      const setButtonState = (busy) => {
        if (!button || !form) {
          return;
        }
        button.disabled = busy;
        button.textContent = busy ? 'Analyzing...' : 'Analyze';
        if (busy) {
          form.setAttribute('aria-busy', 'true');
        } else {
          form.removeAttribute('aria-busy');
        }
      };

      const renderProgress = (payload) => {
        if (status) {
          status.textContent = payload.current_message || 'Queued analysis request';
        }

        const seenSteps = new Set((payload.events || []).map((event) => event.step));
        const currentStep = payload.current_step;
        let currentIndex = stepElements.findIndex(
          (element) => element.dataset.stepId === currentStep,
        );
        if (currentIndex === -1) {
          currentIndex = stepElements.length;
        }

        stepElements.forEach((element, index) => {
          const stepId = element.dataset.stepId;
          const isDone = seenSteps.has(stepId) && stepId !== currentStep;
          element.classList.toggle('done', isDone || index < currentIndex);
          element.classList.toggle('active', stepId === currentStep);
        });

        if (findings) {
          findings.innerHTML = (payload.events || [])
            .map((event) => `<li>${event.message}</li>`)
            .join('');
        }
      };

      const pollJob = async (jobId) => {
        while (true) {
          const response = await fetch(`/analyze/status/${jobId}`);
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || 'Failed to read analysis status');
          }

          renderProgress(payload);

          if (payload.status === 'completed') {
            output.innerHTML = payload.result_html || '';
            setButtonState(false);
            setError('');
            return;
          }

          if (payload.status === 'failed') {
            setButtonState(false);
            setError(payload.error || 'Analysis failed');
            return;
          }

          await new Promise((resolve) => window.setTimeout(resolve, 700));
        }
      };

      output?.addEventListener('click', async (event) => {
        const saveButton = event.target.closest('[data-save-results-button]');
        if (!saveButton) {
          return;
        }
        const section = saveButton.closest('[data-save-results-section]');
        const payloadNode = section?.querySelector('[data-save-results-payload]');
        const statusNode = section?.querySelector('[data-save-results-status]');
        if (!payloadNode) {
          if (statusNode) {
            statusNode.textContent = 'No analysis result available to save.';
          }
          return;
        }

        saveButton.disabled = true;
        if (statusNode) {
          statusNode.textContent = 'Saving rows to Google Sheet...';
        }

        try {
          const response = await fetch('/results/save', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: payloadNode.textContent,
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || 'Unable to save rows to Google Sheet');
          }
          if (statusNode) {
            statusNode.textContent = payload.message || 'Saved to Google Sheet.';
          }
        } catch (error) {
          if (statusNode) {
            statusNode.textContent = error instanceof Error ? error.message : 'Unable to save rows to Google Sheet';
          }
        } finally {
          saveButton.disabled = false;
        }
      });

      form?.addEventListener('submit', async (event) => {
        if (!window.fetch) {
          return;
        }
        event.preventDefault();
        resetProgressUi();
        setError('');
        if (output) {
          output.innerHTML = '';
        }
        setButtonState(true);
        if (status) {
          status.textContent = 'Submitting analysis request...';
        }

        try {
          const response = await fetch('/analyze/start', {
            method: 'POST',
            body: new FormData(form),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || 'Unable to start analysis');
          }
          await pollJob(payload.job_id);
        } catch (error) {
          setButtonState(false);
          setError(error instanceof Error ? error.message : 'Unable to start analysis');
        }
      });
    </script>
  </body>
</html>
